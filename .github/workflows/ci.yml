name: ci
on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.16"

jobs:
  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all -- --check

  nats-unit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "17" }
      - run: cargo test --no-default-features --features pg17,embedded-nats nats::parser::tests
      - run: cargo test --no-default-features --features pg17,embedded-nats nats::router::tests

  clippy:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }
      - run: cargo clippy --no-default-features --features pg${{ matrix.pg }} -- -D warnings

  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-pgrx
        with: { pg: "${{ matrix.pg }}" }
      - run: cargo pgrx test --no-default-features --features pg${{ matrix.pg }} pg${{ matrix.pg }}
