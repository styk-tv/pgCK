name: update-latest-md

# Refresh LATEST.md from GHCR — but ONLY after SLSA Build Provenance v1
# attestations verify against the digests we're about to publish. This is
# the policy gate that keeps workstation pushes off the head pointer: if
# `gh attestation verify` doesn't find a workflow-issued attestation, this
# workflow exits non-zero and LATEST.md stays where it was.

on:
  workflow_run:
    workflows:
      - release
      - Publish pgck-web OCI Layer
    types:
      - completed

permissions:
  contents: write        # commit refreshed LATEST.md back to main
  packages: read         # read GHCR package versions
  attestations: read     # gh attestation verify

jobs:
  refresh:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve current GHCR heads
        id: heads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # Most recent extension version (e.g. 0.1.7) — picked from the
          # tags on the pgck package that match X.Y.Z-pg17-amd64.
          EXT_VER=$(gh api -H "Accept: application/vnd.github+json" \
            "/users/${OWNER}/packages/container/pgck/versions" --paginate \
            --jq '.[].metadata.container.tags[]' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-pg17-amd64$' \
            | sort -V | tail -1 \
            | sed 's/-pg17-amd64$//')
          WEB_VER=$(gh api -H "Accept: application/vnd.github+json" \
            "/users/${OWNER}/packages/container/pgck-web/versions" --paginate \
            --jq '.[].metadata.container.tags[]' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-amd64$' \
            | sort -V | tail -1 \
            | sed 's/-amd64$//')
          if [ -z "${EXT_VER}" ] || [ -z "${WEB_VER}" ]; then
            echo "could not resolve heads (ext='${EXT_VER}' web='${WEB_VER}')" >&2
            exit 1
          fi
          echo "ext_ver=${EXT_VER}" >> "$GITHUB_OUTPUT"
          echo "web_ver=${WEB_VER}" >> "$GITHUB_OUTPUT"

      - name: Verify SLSA Build Provenance — refuse to update on missing attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXT_VER: ${{ steps.heads.outputs.ext_ver }}
          WEB_VER: ${{ steps.heads.outputs.web_ver }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          for tag in "${EXT_VER}-pg17-amd64" "${EXT_VER}-pg17-arm64"; do
            echo "::group::verify ghcr.io/${OWNER}/pgck:${tag}"
            gh attestation verify "oci://ghcr.io/${OWNER}/pgck:${tag}" \
              --repo "${GITHUB_REPOSITORY}"
            echo "::endgroup::"
          done
          for tag in "${WEB_VER}-amd64" "${WEB_VER}-arm64"; do
            echo "::group::verify ghcr.io/${OWNER}/pgck-web:${tag}"
            gh attestation verify "oci://ghcr.io/${OWNER}/pgck-web:${tag}" \
              --repo "${GITHUB_REPOSITORY}"
            echo "::endgroup::"
          done

      - name: Render LATEST.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          EXT_VER: ${{ steps.heads.outputs.ext_ver }}
          WEB_VER: ${{ steps.heads.outputs.web_ver }}
        run: |
          set -euo pipefail
          python3 tools/render-latest-md.py > LATEST.md.new
          mv LATEST.md.new LATEST.md

      - name: Commit refresh if changed
        env:
          EXT_VER: ${{ steps.heads.outputs.ext_ver }}
          WEB_VER: ${{ steps.heads.outputs.web_ver }}
        run: |
          set -euo pipefail
          if git diff --quiet LATEST.md; then
            echo "LATEST.md already current — nothing to do"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LATEST.md
          git commit -m "docs(auto): refresh LATEST.md to ${EXT_VER} / ${WEB_VER}

Generated by .github/workflows/update-latest-md.yml after the upstream
release.yml / publish-pgck-web.yml workflow reported success AND after
SLSA Build Provenance v1 attestations verified via \`gh attestation
verify\` for every digest about to be advertised. Do not edit by hand.

[skip ci]"
          git push origin main
