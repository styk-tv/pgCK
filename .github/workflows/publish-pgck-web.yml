name: Publish pgck-web OCI Layer

on:
  push:
    tags:
      - 'pgck-web/v*'
    paths:
      - 'web/**'
      - 'requirements.txt'
      - '.github/workflows/publish-pgck-web.yml'

# id-token:write    — OIDC for Sigstore keyless signing
# attestations:write — SLSA Build Provenance v1 stamped on every image push
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref }}
          VERSION=${TAG#refs/tags/pgck-web/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine architecture tag
        id: arch
        run: |
          PLATFORM=${{ matrix.platform }}
          case "$PLATFORM" in
            linux/amd64) echo "arch_tag=amd64" >> $GITHUB_OUTPUT ;;
            linux/arm64) echo "arch_tag=arm64" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile.pgck-web
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/styk-tv/pgck-web:${{ steps.version.outputs.version }}-${{ steps.arch.outputs.arch_tag }}
            ghcr.io/styk-tv/pgck-web:latest-${{ steps.arch.outputs.arch_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- SLSA Build Provenance v1 attestation -------------------------
      # buildx-pushed digest is steps.push.outputs.digest; we attest the
      # image-by-digest so the attestation matches whichever tag pulls it.
      # update-latest-md.yml REQUIRES this attestation to verify before it
      # advances LATEST.md (workstation pushes therefore can't ship a head).
      - name: Attest pgck-web image
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/styk-tv/pgck-web
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        id: sbom
        # syft cannot pull arm64 image from amd64 runner without QEMU; non-fatal until split into per-arch matrix
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/styk-tv/pgck-web:${{ steps.version.outputs.version }}-${{ steps.arch.outputs.arch_tag }}
          format: spdx-json
          output-file: pgck-web-${{ steps.arch.outputs.arch_tag }}-sbom.spdx.json

      - name: Upload SBOM
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.arch.outputs.arch_tag }}
          path: pgck-web-${{ steps.arch.outputs.arch_tag }}-sbom.spdx.json

  notify-germination:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Notify oci-germination
        run: |
          echo "pgck-web OCI layer published:"
          echo "  ghcr.io/styk-tv/pgck-web:${{ needs.build-and-push.outputs.version }}-amd64"
          echo "  ghcr.io/styk-tv/pgck-web:${{ needs.build-and-push.outputs.version }}-arm64"
          echo ""
          echo "Next: Update oci-germination to consume this layer."
