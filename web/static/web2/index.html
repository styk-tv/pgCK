<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pgCK · web2 workbench</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<link rel="stylesheet" href="shell/app.css" />
</head>
<body>
  <div class="top">
    <span class="dot" id="dot"></span>
    <h1>pgCK · web2</h1>
    <span class="tag">kernel workbench</span>
    <span class="conn" id="conn">offline · local spine</span>
    <div class="spacer"></div>
    <nav style="display:flex;gap:4px">
      <a href="/assets/web3/">konva (web3)</a>
      <a href="/assets/explorer/index.html">explorer (v1)</a>
      <a href="/assets/tasks.html">board (v1)</a>
    </nav>
  </div>
  <div id="body">
    <div id="rail"></div>
    <div id="surface"></div>
  </div>

  <!-- spine (classic IIFEs set window.Bus / window.Props / ingest reducer) -->
  <script src="spine/bus.js"></script>
  <script src="spine/ingest.js"></script>
  <script src="spine/props.js"></script>
  <!-- shell -->
  <script src="shell/rail.js"></script>
  <script src="shell/surface.js"></script>
  <!-- konva (vendored once under web3) — the studio canvas substrate -->
  <script src="/assets/web3/vendor/konva.min.js"></script>
  <!-- modular grid canvas component -->
  <script src="shell/gridcanvas.js"></script>
  <!-- kernels self-register into window.CKKernels (rail order) -->
  <script src="kernels/studio/engine.js?v=3"></script>
  <script src="kernels/explorer/engine.js?v=2"></script>
  <script src="kernels/board/engine.js"></script>
  <script src="kernels/signage/engine.js"></script>
  <script src="kernels/settings/engine.js"></script>

  <!-- classic boot: register the cktransport-ready listener BEFORE the deferred
       module transport.js fires (modules are deferred; this runs during parse). -->
  <script>
  (function () {
    const dot = document.getElementById("dot");
    const conn = document.getElementById("conn");

    // offline-first: render the shell on the local spine immediately
    window.Shell.renderRail();
    const DEFAULT = "studio";
    window.Shell.setActive(DEFAULT);

    window.addEventListener("cktransport-ready", function () {
      window.CKTransport.onStatus(function (c) {
        const live = c === "connected";
        conn.textContent = live ? "live · NATS WSS" : c;
        dot.className = "dot" + (live ? " on live" : "");
      });
      // one stream: fan raw events to kernels (signage) AND debounce-refresh the
      // authoritative board snapshot for explorer/board.
      window.CKTransport.onEvent(function (data, raw) {
        window.Bus.emit("event.in", { data: data, raw: raw });
        window.Shell.fanEvent(data, raw);
        window.Ingest.refresh();
      });
      // flip live, then backfill the full board via snapshot.board
      window.CKTransport.connect()
        .then(function () { return window.Ingest.snapshot(); })
        .catch(function () { conn.textContent = "connect failed"; });
    });
  })();
  </script>
  <!-- deferred module: builds CKClient, dispatches cktransport-ready at end -->
  <script type="module" src="spine/transport.js"></script>
</body>
</html>
