<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pgCK Display — NATS Messages</title>
    <link rel="stylesheet" href="/assets/app.css?v=u1" />
  </head>
  <body>
    <nav class="nav-menu">
      <a href="/" class="nav-link display-link">Display</a>
      <a href="/tasks.html" class="nav-link board-link">Board</a>
    </nav>
    <script>
      // U1: static page. Config is client-derived from the serving host —
      // no FastAPI injection. Identity/session arrive dynamically via the
      // NATS envelope (headers) -> pgCK Participant/Session (U2), not baked here.
      (function () {
        var host = location.host || "pgck.localhost";
        var wsScheme = location.protocol === "http:" ? "ws" : "wss";
        window.PGCK_DISPLAY_CONFIG = {
          nats_ws_url: wsScheme + "://" + host + "/wss",
          nats_subject: "event.pgCK.Display",
          nats_subject_long: "event.kernel.pgCK.Display.broadcast",
          display_kernel: "pgCK.Display",
          cklib_base: "/cklib",
          protocol_version: 1
        };
      })();
    </script>

    <main class="shell">
      <section class="status-card">
        <div class="eyebrow">pgCK display — NATS messages</div>
        <div class="status-row">
          <span class="status-dot" id="connection-dot"></span>
          <span id="connection-status">Connecting…</span>
        </div>
        <dl class="meta">
          <div>
            <dt>NATS WS</dt>
            <dd id="nats-url"></dd>
          </div>
          <div>
            <dt>Subject</dt>
            <dd id="nats-subject"></dd>
          </div>
          <div>
            <dt>Audio</dt>
            <dd id="audio-status">Idle</dd>
          </div>
        </dl>
        <button class="audio-button" id="audio-unlock">Enable audio</button>
      </section>

      <section class="protocol-card">
        <div class="eyebrow">Protocol</div>
        <p>This page receives NATS broadcast messages: theme changes, audio, and live events.</p>
        <div id="protocol-output" class="protocol-output">Loading protocol…</div>
        <div class="eyebrow">Last payload</div>
        <pre id="last-payload" class="last-payload">No payload received yet.</pre>
      </section>
    </main>

    <audio id="audio-player" preload="auto"></audio>
    <script type="module" src="/assets/display-app.js?v=u1"></script>
  </body>
</html>
