# nats-server config for the pgCK auth-callout e2e (scripts/dev-callout-e2e.sh).
#
# pgCK owns admittance: every client connection is routed to the $SYS.REQ.USER.AUTH
# responder inside the pgck bgworker (SPEC.OAUTH2 §3.2). Only `pgck_worker` — the
# responder's own connection — bypasses the callout (auth_users). There is NO
# no_auth_user: a token-less client still traverses the callout and is admitted
# anonymous (subscribe-only), which replaces the old static anonymous config.
#
# $PGCK_CALLOUT_ISSUER = the account PUBLIC nkey (A…); the matching seed is
# delivered to pgCK as pgck.nats_account_seed. Generated fresh per e2e run.
server_name: "pgck-callout-e2e"
listen: "0.0.0.0:4222"
http: "0.0.0.0:8222"

authorization {
  auth_callout {
    issuer: $PGCK_CALLOUT_ISSUER
    auth_users: [ pgck_worker ]
  }
  users = [
    { user: pgck_worker, password: $PGCK_WORKER_PASSWORD }
  ]
}
